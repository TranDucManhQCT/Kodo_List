<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>My Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Danh sách công việc</h1>
        
        <div class="input-section">
            <input type="text" id="todo-input" placeholder="Thêm công việc mới">
            <button id="add-btn">Thêm</button>
        </div>

        <ul id="todo-list">
            <div>
                <input type = "checkbox" id = "dong_1" name = "dong_1" value ="dong_1">
                <label for = " dong_1"> <span>Học Java Spring Boot</span> </label>               
                <button class="delete-btn">Xóa</button>
            </div>
            <div>
                <input type = "checkbox" id = "dong_2" name = "dong_2" value ="dong_2">
                <label for = " dong_2"> <span>Task IE101</span> </label>               
                <button class="delete-btn">Xóa</button>
            </div>
        </ul>
    </div>
</body>
</html>
