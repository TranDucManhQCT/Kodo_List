<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <!-- Tùy biến layout cho thiết bị -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kodo List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
    <div class="container">
        <h1>Việc cần làm</h1>
       <!-- DM - đã đổi từ div qua form để nhấn enter có thể submit -->
        <form class="input-section" id="task-form">
            <input type="text" id="todo-input" placeholder="Thêm công việc mới">
            <button type="submit" id="add-btn">+</button>
        </form>

        <ul id="todo-list">
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
